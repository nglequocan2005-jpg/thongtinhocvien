<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Tra Cứu Google Sheets</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f4f6f9;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 1000px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h2 {
            color: #333;
            margin-top: 0;
            text-align: center;
        }
        .search-box {
            width: 100%;
            padding: 12px 20px;
            margin: 20px 0;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.3s;
        }
        .search-box:focus {
            border-color: #28a745;
        }
        .status {
            text-align: center;
            color: #666;
            font-style: italic;
            margin: 10px 0;
        }
        .table-responsive {
            overflow-x: auto;
            margin-top: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
            white-space: nowrap;
        }
        th {
            background-color: #f8f9fa;
            color: #333;
            font-weight: 600;
        }
        tr:hover {
            background-color: #fdfdfd;
        }
        .no-result {
            text-align: center;
            color: #888;
            padding: 20px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Hệ Thống Tra Cứu Dữ Liệu Tự Động</h2>
    <div id="loadingStatus" class="status">Đang tải dữ liệu từ Google Sheets...</div>
    
    <!-- Thanh tìm kiếm -->
    <input type="text" id="searchInput" class="search-box" placeholder="Nhập từ khóa bất kỳ để tra cứu nhanh..." onkeyup="searchData()" disabled>

    <!-- Bảng hiển thị dữ liệu -->
    <div class="table-responsive">
        <table id="dataTable" style="display: none;">
            <thead id="tableHead">
                <!-- Tiêu đề cột sẽ tự động sinh ra dựa theo file Excel của bạn -->
            </thead>
            <tbody id="tableBody">
                <!-- Dữ liệu sẽ đổ vào đây -->
            </tbody>
        </table>
    </div>
    
    <div id="noResult" class="no-result">Không tìm thấy kết quả nào trùng khớp.</div>
</div>

<script>
    // Điền ID và tên Sheet (Mặc định trang đầu tiên thường là Sheet1)
    const SHEET_ID = '1Ff1hN-yEo6n0Zs16dgma4oNEEE7zVLUhO83_H49uLDc';
    const SHEET_NAME = 'Sheet1'; 
    
    // Đường dẫn lấy dữ liệu dạng tsv (Tab-Separated Values) cực kỳ nhẹ và chuẩn xác
    const FULL_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${SHEET_NAME}`;

    let DATA_SOURCE = [];
    let HEADERS = [];

    // Hàm tự động chạy khi mở web để kết nối dữ liệu
    async function init() {
        try {
            const response = await fetch(FULL_URL);
            const dataText = await response.text();
            
            // Xử lý dữ liệu CSV/TSV nhận về từ Google
            parseCSV(dataText);
            
            if(DATA_SOURCE.length > 0) {
                document.getElementById("loadingStatus").style.display = "none";
                document.getElementById("searchInput").disabled = false;
                document.getElementById("dataTable").style.display = "table";
                
                renderHeaders();
                renderTable(DATA_SOURCE);
            }
        } catch (error) {
            console.error(error);
            document.getElementById("loadingStatus").innerText = "Lỗi: Không thể kết nối với Google Sheets. Hãy kiểm tra lại cấu hình chia sẻ!";
            document.getElementById("loadingStatus").style.color = "red";
        }
    }

    // Hàm chuyển đổi chuỗi CSV của Google thành mảng dữ liệu
    function parseCSV(text) {
        // Cắt văn bản theo từng dòng
        const lines = text.split('\n');
        if (lines.length === 0) return;

        // Hàm nhỏ để bỏ dấu ngoặc kép bọc quanh văn bản của Google Sheets
        const cleanCell = cell => cell ? cell.replace(/^"(.*)"$/, '$1').trim() : "";

        // Lấy dòng đầu tiên làm tiêu đề cột
        HEADERS = lines[0].split(',').map(cleanCell);

        // Duyệt qua các dòng tiếp theo để lấy dữ liệu
        for (let i = 1; i < lines.length; i++) {
            if (!lines[i]) continue;
            
            // Tách các cột bằng dấu phẩy (xử lý trường hợp có dấu phẩy trong nội dung)
            const cells = lines[i].match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || lines[i].split(',');
            const cleanCells = cells.map(cleanCell);
            
            // Tạo một object đại diện cho 1 dòng dữ liệu
            let rowObject = {};
            HEADERS.forEach((header, index) => {
                rowObject[header] = cleanCells[index] || "";
            });
            DATA_SOURCE.push(rowObject);
        }
    }

    // Tự động vẽ các tiêu đề cột lên giao diện
    function renderHeaders() {
        const tableHead = document.getElementById("tableHead");
        let headerRow = "tr";
        let content = "";
        HEADERS.forEach(header => {
            content += `<th>${header}</th>`;
        });
        tableHead.innerHTML = `<tr>${content}</tr>`;
    }

    // Đổ dữ liệu vào hàng của bảng
    function renderTable(data) {
        const tableBody = document.getElementById("tableBody");
        tableBody.innerHTML = ""; 

        data.forEach(item => {
            let rowContent = "";
            HEADERS.forEach(header => {
                rowContent += `<td>${item[header]}</td>`;
            });
            tableBody.innerHTML += `<tr>${rowContent}</tr>`;
        });
    }

    // Hàm tìm kiếm thời gian thực toàn bộ các cột
    function searchData() {
        const keyword = document.getElementById("searchInput").value.toLowerCase().trim();
        const noResultDiv = document.getElementById("noResult");
        const table = document.getElementById("dataTable");

        const filteredData = DATA_SOURCE.filter(item => {
            // Kiểm tra xem từ khóa có xuất hiện trong bất kỳ ô nào của dòng dữ liệu không
            return HEADERS.some(header => item[header].toLowerCase().includes(keyword));
        });

        if (filteredData.length === 0) {
            table.style.display = "none";
            noResultDiv.style.display = "block";
        } else {
            table.style.display = "table";
            noResultDiv.style.display = "none";
            renderTable(filteredData);
        }
    }

    // Kích hoạt hệ thống
    init();
</script>

</body>
</html>
