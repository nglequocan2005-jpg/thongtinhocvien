<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tra cứu Thông tin Học viên</title>
    <!-- Sử dụng Tailwind CSS qua CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center py-10">

    <div class="w-full max-w-lg bg-white p-8 rounded-xl shadow-lg">
        <h1 class="text-2xl font-bold text-blue-900 mb-6 text-center">TRA CỨU DỮ LIỆU HỌC VIÊN</h1>
        
        <!-- Ô tìm kiếm -->
        <div class="flex gap-2">
            <input type="text" id="searchInput" placeholder="Nhập mã học viên..." 
                   class="flex-1 border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
            <button onclick="handleSearch()" 
                    class="bg-blue-800 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition">
                Tra cứu
            </button>
        </div>

        <!-- Khu vực hiển thị trạng thái/kết quả -->
        <div id="resultArea" class="mt-8">
            <div id="status" class="text-gray-500 text-center italic">Chờ nhập thông tin...</div>
        </div>
    </div>

</body>
</html>
